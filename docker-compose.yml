version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: techstore_db
    environment:
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore123
      POSTGRES_DB: techstore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: techstore_backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: techstore
      DB_PASSWORD: techstore123
      DB_NAME: techstore_db
      JWT_SECRET: supersecretjwt2024
      NODE_ENV: development
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: techstore_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: